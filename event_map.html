<!DOCTYPE html>
<html>
<head>
    <title>Event Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    
    <!-- Fullscreen plugin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css" />
    <script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>
    
    <!-- MarkerCluster plugin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <style>
        #map { height: 600px; width: 100%; }
        .popup-image { max-width: 100px; height: auto; margin-bottom: 5px; }
        #legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            font-size: 13px;
            z-index: 1000;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>The Hottest Events in the World</h1>
    <div id="map"></div>
    <div id="legend">
        <b>Event Types</b><br>
        <img src="./MilitaryIcon.png" width="20" /> Military<br>
        <img src="./ProtestIcon.png" width="20" /> Protest<br>
        <img src="./TerrorismIcon.png" width="20" /> Terrorism<br>
        <img src="./DisasterIcon.png" width="20" /> Disaster/Accident<br>
        <img src="./NDIcon.png" width="20" /> Natural Disaster<br>
        <img src="./HumanitarianCrisisIcon.png" width="20" /> Humanitarian<br>
    </div>

    <script>
        var map = L.map('map', {
            fullscreenControl: true
        }).setView([20, 0], 2);

//        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
//            attribution: '© OpenStreetMap contributors'
//        }).addTo(map);

        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a> | &copy; OpenStreetMap contributors',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

        var markers = L.markerClusterGroup();

        function createIcon(url) {
            return L.icon({
                iconUrl: './' + url,
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -10]
            });
        }

        var icons = {
            "military": createIcon("MilitaryIcon.png"),
            "protest/unrest": createIcon("ProtestIcon.png"),
            "terrorism": createIcon("TerrorismIcon.png"),
            "disaster": createIcon("DisasterIcon.png"),
            "accident": createIcon("DisasterIcon.png"),
            "explosion": createIcon("ExplosionIcon.png"),
            "natural disaster": createIcon("NDIcon.png"),
            "humanitarian crisis": createIcon("HumanitarianCrisisIcon.png"),
            "piracy": createIcon("PiracyIcon.png"),
            "cyber crime": createIcon("CyberCrimeIcon.png"),
            "assassination": createIcon("AssassinationIcon.png"),
            "unknown": createIcon("UnknownIcon.png"),
            "violent": createIcon("UnknownIcon.png"),
            "news": createIcon("UnknownIcon.png"),
            "law enforcement": createIcon("Police.png")
        };

        // Placeholder: Add markers here, e.g.:
        // var marker = L.marker([lat, lng], {icon: icons["military"]}).bindPopup("Info...");
        // markers.addLayer(marker);

                var marker =  null;
    
               marker = L.marker([23.0, -102.0], {icon: icons["military"]}).bindPopup("<a href='https://www.bbc.com/news/articles/cx2lp7xwql4o?at_medium=RSS&at_campaign=rss'  target='_blank'> <b>Mexico sends thousands of soldiers to stop violence after death of drug lord</b></a><br>Mexico (MEX) <br>death toll: 0<br> <img src='https://ichef.bbci.co.uk/news/1024/branded_news/e39e/live/a5ab2ba0-10cb-11f1-b4d3-abf57a569766.jpg' class='popup-image' alt='Event Image'><br> <br> ...Mexico sends thousands of soldiers to stop violence after death of drug lord <br><small>Published: 2026/2/23 21:12</small>");
               markers.addLayer(marker);
               marker = L.marker([49.0, 32.0]).bindPopup( "<a href='https://www.bbc.com/news/articles/c8jxpevngveo?at_medium=RSS&at_campaign=rss' target='_blank'> <b>The Papers: &#39;Mandelson arrested&#39; and &#39;Four years of tears&#39; in Ukraine</b></a><br> <img src='https://ichef.bbci.co.uk/news/1024/branded_news/ba6d/live/147838b0-1113-11f1-9120-a910fc22c6ac.jpg' class='popup-image' alt='Event Image'><br> Ukraine (UKR)<br>...The Papers: &#39;Mandelson arrested&#39; and &#39;Four years of tears&#39; in Ukraine<br><small>Published: 2026/2/24 0:14</small>" );
            markers.addLayer(marker);
            
               marker = L.marker([39.76, -98.5], {icon: icons["military"]}).bindPopup("<a href='https://ria.ru/20260224/amerika-2076319325.html'  target='_blank'> <b>......</b></a><br>United States (USA) <br>death toll: 0<br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076319325.jpg?20740845701771916229' class='popup-image' alt='Event Image'><br> <br> ...Israeli intelligence assesses US potential for strikes on Iran &quot;Israeli intelligence has concluded that even with the imminent arrival of the aircraft carrier USS Gerald R Ford later this week&#44; the United States only has the military capacity to carry out intensive air strikes for four to five days or a week in the event of lower-intensity strikes&#44;&quot; the publication writes&#44; citing an unnamed Mossad official. <br><small>Published: 2026/2/24 6:00</small>");
               markers.addLayer(marker);
               marker = L.marker([35.69439, 51.42151]).bindPopup( "<a href='https://ria.ru/20260224/trump-2076316669.html' target='_blank'> <b>Trump is disappointed that the Iran issue cannot be resolved with one blow&#44; the media write</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076316669.jpg?20762579771771910493' class='popup-image' alt='Event Image'><br> Tehran (IRN)<br>...Trump is increasingly frustrated by what his aides say are limited military leverage against Iran... Trump has been told that any strike on Tehran targets will almost certainly not be a single&#44; decisive blow.<br><small>Published: 2026/2/24 5:21</small>" );
            markers.addLayer(marker);
            marker = L.marker([49.0, 32.0]).bindPopup( "<a href='https://ria.ru/20260224/zakharova-2076316372.html' target='_blank'> <b>Zakharova: Kiev’s violation of the friendship treaty led to the decision to start the SVO</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076316372.jpg?20696047551771914728' class='popup-image' alt='Event Image'><br> Ukraine (UKR)<br>...“For a number of years&#44; the leadership of Ukraine has pursued a policy of gross and systematic violation of the provisions of the treaty&#44; which should be qualified as a refusal to implement it&#44; which later&#44; in particular&#44; led to the decision by the Russian leadership to launch a special military operation&#44;” she said.<br><small>Published: 2026/2/24 5:18</small>" );
            markers.addLayer(marker);
            marker = L.marker([24.0, 121.0]).bindPopup( "<a href='https://ria.ru/20260224/tajvan-2076316217.html' target='_blank'> <b>An earthquake of magnitude 5.6 occurred off the coast of Taiwan</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076316217.jpg?15885424581771910186' class='popup-image' alt='Event Image'><br> Taiwan (TWN)<br>...An earthquake of magnitude 5.6 occurred off the coast of Taiwan<br><small>Published: 2026/2/24 5:15</small>" );
            markers.addLayer(marker);
            marker = L.marker([54.32824, 48.38657]).bindPopup( "<a href='https://ria.ru/20260224/aeroport-2076315227.html' target='_blank'> <b>Temporary restrictions have been introduced at Ulyanovsk airport</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076315227.jpg?15573565871771909189' class='popup-image' alt='Event Image'><br> Ulyanovsk (RUS)<br>...Temporary restrictions have been introduced at Ulyanovsk airport<br><small>Published: 2026/2/24 4:59</small>" );
            markers.addLayer(marker);
            marker = L.marker([53.20007, 50.15]).bindPopup( "<a href='https://ria.ru/20260224/samara-2076314269.html' target='_blank'> <b>Temporary restrictions have been introduced at Samara airport</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076314269.jpg?11397630211771907607' class='popup-image' alt='Event Image'><br> Samara (RUS)<br>...Temporary restrictions have been introduced at Samara airport<br><small>Published: 2026/2/24 4:33</small>" );
            markers.addLayer(marker);
            marker = L.marker([49.0, 32.0]).bindPopup( "<a href='https://ria.ru/20260224/ukraina-2076307891.html' target='_blank'> <b>In Ukraine&#44; the damage in the case of the ex-deputy head of Zelensky’s office was assessed</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076307891.jpg?10227452321771902816' class='popup-image' alt='Event Image'><br> Ukraine (UKR)<br>...In Ukraine&#44; the damage in the case of the ex-deputy head of Zelensky’s office was assessed<br><small>Published: 2026/2/24 3:13</small>" );
            markers.addLayer(marker);
            marker = L.marker([47.13975, 39.75181]).bindPopup( "<a href='https://ria.ru/20260224/dtp-2076306599.html' target='_blank'> <b>In Bataysk&#44; the number of victims in an accident with three cars has increased</b></a><br> <img src='https://cdnn21.img.ria.ru/images/sharing/article/2076306599.jpg?15781258271771901906' class='popup-image' alt='Event Image'><br> Bataysk (RUS)<br>...In Bataysk&#44; the number of victims in an accident with three cars has increased<br><small>Published: 2026/2/24 2:58</small>" );
            markers.addLayer(marker);
            marker = L.marker([43.21667, 27.91667]).bindPopup( "<a href='https://www.dnevnik.bg/bulgaria/2026/02/24/4886028_goliam_pojar_goria_na_nezakonno_smetishte_za_gumi_krai/?ref=rss' target='_blank'> <b>A large fire is burning at an illegal tire dump near Varna</b></a><br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4662335.jpg' class='popup-image' alt='Event Image'><br> Varna (BGR)<br>...A large fire is burning at an illegal tire dump near Varna<br><small>Published: 2026/2/24 6:40</small>" );
            markers.addLayer(marker);
            
               marker = L.marker([23.0, -102.0], {icon: icons["protest/unrest"]}).bindPopup("<a href='https://www.dnevnik.bg/sviat/2026/02/24/4886022_armiiata_e_izpratena_v_razmirnite_shtati_na_meksiko/?ref=rss'  target='_blank'> <b>The army is sent to the troubled states of Mexico</b></a><br>Mexico (MEX) <br>death toll: 0<br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4886023.jpg' class='popup-image' alt='Event Image'><br> <br> ...Thousands of soldiers have been sent to strengthen security because of unrest in Mexico. <br><small>Published: 2026/2/24 5:58</small>");
               markers.addLayer(marker);
               
               marker = L.marker([49.0, 32.0], {icon: icons["humanitarian crisis"]}).bindPopup("<a href='https://www.dnevnik.bg/sviat/voinata_v_ukraina/2026/02/24/4885988_80_ot_firmite_v_ukraina_sa_zasegnati_ot_prekusvaniia/?ref=rss'  target='_blank'> <b>80% of businesses in Ukraine are affected by power outages because of Putin</b></a><br>Ukraine (UKR) <br>death toll: 0<br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4885991.jpg' class='popup-image' alt='Event Image'><br> <br> ...80% of businesses in Ukraine are affected by power outages because of Putin <br><small>Published: 2026/2/24 5:03</small>");
               markers.addLayer(marker);
               marker = L.marker([42.69751, 23.32415]).bindPopup( "<a href='https://www.dnevnik.bg/analizi/2026/02/24/4885055_zashto_se_spihnaha_protestnata_energiia_i_gen_z/?ref=rss' target='_blank'> <b>Why did the protest energy and Gen Z euphoria subside</b></a><br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4886002.jpg' class='popup-image' alt='Event Image'><br> Sofia (BGR)<br>...Fellow analysts and prominent politicians from the &quot;good forces&quot; were ecstatic&#44; even intoxicated by the mobilization of generation Z in the squares of Sofia&#44; Plovdiv&#44; and Varna.<br><small>Published: 2026/2/24 4:16</small>" );
            markers.addLayer(marker);
            
               marker = L.marker([49.0, 32.0], {icon: icons["military"]}).bindPopup("<a href='https://www.dnevnik.bg/analizi/2026/02/24/4885861_ikonomikata_na_ukraina_ustoiava_na_trudnosti_koeto/?ref=rss'  target='_blank'> <b>......</b></a><br>Ukraine (UKR) <br>death toll: 0<br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4885887.jpg' class='popup-image' alt='Event Image'><br> <br> ...Ukraine&#39;s economy withstands hardships that would have ruined others  Four years later&#44; Ukraine is still standing&#44; despite 13&#44;000 missile strikes and 140&#44;000 drone attacks&#44; mass displacement&#44; daily power outages and countless other shocks that would have devastated most economies. <br><small>Published: 2026/2/24 4:13</small>");
               markers.addLayer(marker);
               
               marker = L.marker([44.81892, 20.45998], {icon: icons["protest/unrest"]}).bindPopup("<a href='https://www.dnevnik.bg/sviat/2026/02/23/4885961_srubski_studenti_svikvat_v_nish_antipravitelstven/?ref=rss'  target='_blank'> <b>Serbian students organize anti-government protest in Niš</b></a><br>Serbia (SRB) <br>death toll: 0<br> <img src='https://img.dnevnik.bg/shimg/zx1200y630d_4885964.jpg' class='popup-image' alt='Event Image'><br> <br> ...The then-largest city in eastern and southern Serbia was locked down for 18 hours in solidarity with the families of 16 people killed and one seriously injured when a railway visor collapsed in the northern Serbian city of Novi Sad on November 1&#44; 2024. <br><small>Published: 2026/2/23 20:46</small>");
               markers.addLayer(marker);
               
    map.addLayer(markers);
    </script>
</body>
</html>
